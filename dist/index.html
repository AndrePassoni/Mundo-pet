<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,700;1,700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo Pet</title>
<link rel="icon" href="Pet-Paw.svg"><script defer src="main.js"></script></head>
<body>
    <div class="logo">
        <img src="./src/assets/logo.svg" alt="">
    </div>

    <main>
        <header>
            <div class="text-header">
                <h1>Sua agenda</h1>
                <p>Aqui você pode ver todos os clientes e serviços agendados para hoje.</p>
            </div>
            
            <div class="input" onclick="document.getElementById('date').showPicker()">
                <img class="input__icon" src="./src/assets/Calendar.svg" alt="Calendário">
                <input type="date" id="date" name="date">
                <img class="input__arrow" src="./src/assets/arrow-down.svg" alt="">
            </div>
        </header>


        <div class="schedules">
            <section class="schedule-period">
                <header>
                    <img src="./src/assets/morning.svg" alt="Manhã">
                    <strong>Manhã</strong>
                    <span>09h-12h</span>
                </header>
                
                <div class="divisor"></div>
                
                <ul id="period-morning">
                <!-- Exemplo de agendamento da manhã 
                <li>
                    <div class="left">
                        <strong>09:00</strong>
                        <strong>Thor</strong>
                        <span>/ Fernanda Costa</span>
                    </div>
                    <span>Vacinação</span>
                    <a href="">Remover agendamento</a>
                </li> -->
            </ul>
            </section>

            <section class="schedule-period">
                <header>
                    <img src="./src/assets/afternoon.svg" alt="Manhã">
                    <strong>Tarde</strong>
                    <span>13h-18h</span>
                </header>

            <div class="divisor"></div>

            <ul id="period-afternoon">
                <!-- Exemplo de agendamento da tarde
                <li>
                    <div class="left">
                        <strong>13:00</strong>
                        <strong>Mel</strong>
                        <span>/ João Souza</span>
                    </div>
                    <span>Corte de Unhas</span>
                    <a href="">Remover agendamento</a>
                </li> -->
            </ul>
            </section>

            <section class="schedule-period">
                <header>
                    <img src="./src/assets/night.svg" alt="Manhã">
                    <strong>Noite</strong>
                    <span>19h-21h</span>
                </header>

            <div class="divisor"></div>

            <ul id="period-night">
                <!-- Exemplo de agendamento da noite
                <li>
                    <div class="left">
                        <strong>20:00</strong>
                        <strong>Max</strong>
                        <span>/ Camila Santos</span>
                    </div>
                    <span>Limpeza de dentes</span>
                    <a href="">Remover agendamento</a>
                </li> -->
            </ul>
            </section>
        </div>
    </main>

    <button class="btn btn-new">novo agendamento</button>

    <div class="modal display">
        <form>
            <div class="modal-header">
                <h2>Agende um atendimento</h2>
                <p>Preencha os dados do cliente para realizar o agendamento</p>
            </div>

            <div class="inputs-wrapper">
                <div class="input-wrapper">
                    <label for="name">Nome do tutor</label>
                    <div class="input-field">
                        <img src="./src/assets/User.svg" alt="Ícone de usuário">
                        <input type="text" name="name" id="name" placeholder="Helena Souza" required>
                    </div>
                </div>

                <div class="input-wrapper">
                    <label for="pet-name">Nome do pet</label>
                    <div class="input-field">
                        <img src="./src/assets/Pet-Paw.svg" alt="Ícone de pata">
                        <input type="text" name="pet-name" id="pet-name" placeholder="Cheddar" required>
                    </div>
                </div>

                <div class="input-wrapper">
                    <label for="phone">Telefone</label>
                    <div class="input-field">
                        <img src="./src/assets/Phone.svg" alt="Ícone de telefone">
                        <input type="tel" name="phone" id="phone" placeholder="(00) 0 0000-0000" required>
                    </div>
                </div>

                <div class="textarea-wrapper">
                    <label for="description">Descrição do serviço</label>
                    <textarea name="description" id="description" cols="30" rows="3" placeholder="Banho e tosa" required></textarea>
                </div>
            </div>

            <div class="schedule-wrapper">
                <div class="date-wrapper">
                    <label for="modal-date">Data</label>
                    <div class="input" onclick="document.getElementById('modal-date').showPicker()">
                        <img class="input__icon" src="./src/assets/Calendar.svg" alt="Calendário">
                        <input type="date" id="modal-date" name="modal-date" required>
                        <img class="input__arrow" src="./src/assets/arrow-down.svg" alt="">
                    </div>
                </div>

                <div class="hour-wrapper">
                    <label for="hour">Hora</label>
                    <div class="input-field">
                        <img src="./src/assets/Clock.svg" alt="Ícone de relógio" onclick="document.getElementById('hour').showPicker()">
                        
                        <select name="hour" id="hour" required>
                            </select>
                        
                        <img class="input__arrow" src="./src/assets/arrow-down.svg" alt="Seta para baixo" onclick="document.getElementById('hour').showPicker()">
                    </div>
                </div>
            </div>
            <button class="btn btn-schedule" type="submit">agendar</button>
        </form>
    </div>
</body>
</html>
